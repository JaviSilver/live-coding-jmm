<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Notas - JMM</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen relative overflow-x-hidden font-sans text-white">

    <div class="gradient-bg"></div>
    <div class="floating-shapes"><div class="shape"></div><div class="shape"></div><div class="shape"></div></div>

    <nav class="fixed top-0 w-full z-50 bg-gray-900/40 backdrop-blur-md border-b border-white/10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="text-white font-bold text-xl flex items-center gap-2">
                <i class="gradient-text fas fa-lock"></i>
                <span class="gradient-text">Notas Seguras</span>
            </div>
            <div id="nav-user-area" class="hidden flex items-center gap-4">
                <span id="user-greeting" class="text-sm text-gray-300 font-medium"></span>
                <button id="logout-btn" class="text-red-400 hover:text-red-300 transition-colors text-sm">
                    <i class="fas fa-sign-out-alt"></i> Salir
                </button>
            </div>
        </div>
    </nav>

    <main class="relative z-10 max-w-4xl mx-auto px-4 pt-28 pb-12">
        <div id="feedback-message" class="mb-6 text-center font-semibold text-sm transition-all duration-300 h-6"></div>

        <div id="auth-panel" class="max-w-md mx-auto">
            
            <div id="login-container" class="glassmorphism rounded-2xl p-8 transform transition-all duration-300">
                <h3 class="text-2xl font-bold text-white mb-6 flex items-center"><i class="fas fa-user-circle mr-3 text-blue-400"></i>Iniciar Sesión</h3>
                <form id="login-form" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Email</label>
                        <input type="email" id="login-email" required class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Contraseña</label>
                        <input type="password" id="login-password" required class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all">
                    </div>
                    <button type="submit" class="w-full bg-gradient-to-r from-blue-500 to-purple-600 hover:from-blue-600 hover:to-purple-700 text-white px-6 py-3 rounded-lg font-medium transition-all duration-300 transform hover:scale-105 shadow-lg">Entrar</button>
                </form>
                <div class="mt-6 text-center text-sm text-gray-400">
                    ¿No estás registrado? <a href="#" id="btn-go-register" class="text-blue-400 hover:text-blue-300 font-medium">Crea una cuenta</a>
                </div>
            </div>

            <div id="register-container" class="glassmorphism rounded-2xl p-8 hidden transform transition-all duration-300">
                <h3 class="text-2xl font-bold text-white mb-6 flex items-center"><i class="fas fa-user-plus mr-3 text-purple-400"></i>Crear Cuenta</h3>
                <form id="register-form" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Email</label>
                        <input type="email" id="reg-email" required class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-purple-400 transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Contraseña</label>
                        <input type="password" id="reg-password" required class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-purple-400 transition-all">
                        <p class="mt-2 text-[10px] text-gray-400 leading-tight">
                        <i class="fas fa-info-circle mr-1"></i> 6-15 caracteres. Debe incluir: 
                        <span class="text-purple-400">Mayúscula, minúscula, número y especial (@$!%*?&._)</span>. Sin espacios.
                        </p>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Confirmar Contraseña</label>
                        <input type="password" id="reg-confirm" required class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-purple-400 transition-all">
                    </div>
                    <button type="submit" class="w-full bg-gradient-to-r from-purple-500 to-pink-600 hover:from-purple-600 hover:to-pink-700 text-white px-6 py-3 rounded-lg font-medium transition-all duration-300 transform hover:scale-105 shadow-lg">Registrarse</button>
                </form>
                <div class="mt-6 text-center text-sm text-gray-400">
                    ¿Ya tienes cuenta? <a href="#" id="btn-go-login" class="text-purple-400 hover:text-purple-300 font-medium">Inicia sesión</a>
                </div>
            </div>
        </div>
        

        <div id="notes-panel" class="hidden">
            <div class="glassmorphism rounded-2xl p-6 mb-8 border-l-4 border-l-blue-500">
                <h3 class="text-xl font-bold mb-4 flex items-center"><i class="fas fa-pen-fancy mr-2 text-blue-400"></i> Nueva Nota</h3>
                <form id="create-note-form" class="space-y-4">
                    <input type="text" id="note-title" placeholder="Título de la nota" required class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all">
                    <textarea id="note-content" placeholder="Escribe aquí tu secreto..." rows="3" required class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all resize-none"></textarea>
                    <button type="submit" class="bg-white/10 hover:bg-white/20 border border-white/20 text-white px-6 py-2 rounded-lg font-medium transition-all duration-300 flex items-center"><i class="fas fa-save mr-2"></i> Guardar</button>
                </form>
            </div>

            <h3 class="text-2xl font-bold mb-6 flex items-center"><i class="fas fa-layer-group mr-3 text-purple-400"></i> Mis Notas</h3>
            
            <div id="notes-list" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div> 
        </div>

    </main>

    <div id="edit-modal" class="fixed inset-0 z-[10000] hidden items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" id="close-modal-bg"></div>
        <div class="relative glassmorphism rounded-2xl p-8 w-full max-w-lg transform transition-all duration-300 scale-100 opacity-100">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-2xl font-bold text-white flex items-center"><i class="fas fa-edit mr-3 text-blue-400"></i>Editar Nota</h3>
                <button id="close-modal-btn" class="text-gray-400 hover:text-white transition-colors p-2 hover:bg-white/10 rounded-lg"><i class="fas fa-times text-xl"></i></button>
            </div>
            <form id="edit-note-form" class="space-y-4">
                <input type="hidden" id="edit-note-id">
                <input type="text" id="edit-note-title" required class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-blue-400">
                <textarea id="edit-note-content" rows="4" required class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-blue-400 resize-none"></textarea>
                <div class="flex gap-4 pt-4">
                    <button type="submit" class="flex-1 bg-gradient-to-r from-blue-500 to-purple-600 hover:from-blue-600 hover:to-purple-700 text-white px-6 py-3 rounded-lg font-medium transition-all hover:scale-105 shadow-lg">Actualizar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
